<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Corporativo</title>
    <link rel="icon" href="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image_view_fullscreen" type="image/png">

    <!-- Hoja de estilos principal de la intranet -->
    <link rel="stylesheet" href="static/intranet.css">

    <script src="static/authService.js"></script>
    <script>
        // Proteger la ruta
        if (!authService.isAuthenticated()) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image" alt="Logo ONCE" style="width: 100px; margin: 0 auto; display: block;">
            <h3>Intranet</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Configuración</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="nav-item">
                <span class="nav-icon">🚪</span>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </div>

    <div class="main-content">
        <header class="main-header">
            <h1>Dashboard Principal</h1>
            <div class="header-controls">
                <button id="theme-toggle" aria-label="Toggle dark mode">
                    <span class="sun-icon" aria-hidden="true">☀️</span>
                    <span class="moon-icon" aria-hidden="true">🌙</span>
                </button>
                <div class="user-profile">
                     <span>Bienvenido</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <div class="widget-card" id="calculator-widget">
                <h2 class="widget-title">Calculadora de Cambio</h2>
                <form id="calcForm" aria-labelledby="calc-heading">
                    <label for="cuenta">Cuenta del cliente (€):</label>
                    <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

                    <label for="recibido">Dinero Recibido (€):</label>
                    <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

                    <button type="submit" id="calcularBtn">Calcular Cambio</button>
                </form>
                <div id="mensaje" role="alert"></div>
                <button type="button" id="dispenseBtn" style="display: none; margin-top: 10px; background-color: #28a745;">Dispensar Cambio</button>
            </div>

            <div class="widget-card" id="voice-widget">
                <h2 class="widget-title">Control por Voz</h2>
                <div id="voiceControls">
                    <button id="startRecording">Grabar voz</button>
                    <button id="stopRecording" disabled>Detener</button>
                </div>
                <div id="voiceResult" role="status" aria-live="polite"></div>
            </div>

            <div class="widget-card wide" id="interactions-widget">
                <h2 class="widget-title">Interacciones Recientes</h2>
                <button id="viewInteractionsBtn">Actualizar Interacciones</button>
                <div id="interactionsContainer"></div>
            </div>
        </main>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
