<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Intranet</title>
    <link rel="stylesheet" href="static/intranet.css">
    <script src="static/authService.js"></script>
    <script>
        if (!authService.isAuthenticated()) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image" alt="Logo ONCE" style="width: 80px; margin: 0 auto; display: block;">
            <h3>Intranet</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Configuración</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="nav-item">
                <span class="nav-icon">🚪</span>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </div>

    <div class="main-content">
        <header class="main-header">
            <h1>Dashboard Principal</h1>
            <div class="header-controls">
                <span>Bienvenido, usuario</span>

            </div>
        </header>

        <main class="dashboard-grid">
            <div class="widget-card" id="calculator-widget">
                <h2 class="widget-title">Calculadora de Cambio</h2>

                <form id="calcForm">
                    <label for="cuenta">Cuenta del cliente (€):</label>
                    <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

                    <label for="recibido">Dinero Recibido (€):</label>
                    <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

                    <button type="submit" id="calcularBtn">Calcular Cambio</button>
                </form>
                <div id="mensaje" role="alert"></div>
                <button type="button" id="dispenseBtn" style="display: none; margin-top: 10px;">Dispensar Cambio</button>
            </div>

                <form id="calcForm">
                    <label for="cuenta">Cuenta del cliente (€):</label>
                    <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

                    <label for="recibido">Dinero Recibido (€):</label>
                    <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

                    <button type="submit" id="calcularBtn">Calcular Cambio</button>
                </form>
                <div id="mensaje" role="alert"></div>
                <button type="button" id="dispenseBtn" style="display: none; margin-top: 10px;">Dispensar Cambio</button>
            </div>

            <div class="widget-card" id="voice-widget">
                <h2 class="widget-title">Control por Voz</h2>
                <div id="voiceControls">
                    <button id="startRecording">Grabar voz</button>
                    <button id="stopRecording" disabled>Detener</button>
                </div>
                <div id="voiceResult" role="status" aria-live="polite"></div>
            </div>

            <div class="widget-card" id="interactions-link-widget">
                <h2 class="widget-title">Historial de Interacciones</h2>
                <p>Consulta el historial completo de todas las transacciones registradas en el sistema.</p>
                <a href="interactions.html" class="button-link" style="text-align: center; display: block; margin-top: 20px;">Ver Historial Completo</a>
            </div>
        </main>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
