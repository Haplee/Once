<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Intranet</title>
    <link rel="stylesheet" href="/static/intranet.css">
    <script src="/static/authService.js"></script>
</head>
<body class="dashboard-page">
    <header class="main-header">
        <div class="logo-container">
            <img src="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image" alt="Logo ONCE" style="width: 60px;">
            <h1 data-key="dashboard_title">Dashboard Principal</h1>
        </div>
        <nav class="main-nav">
            <a href="/" class="nav-item active" data-key="nav_dashboard">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="/settings" class="nav-item" data-key="nav_settings">
                <span class="nav-icon">⚙️</span>
                <span>Configuración</span>
            </a>
            <button id="logoutBtn" class="nav-item" data-key="nav_logout">
                <span class="nav-icon">🚪</span>
                <span>Cerrar Sesión</span>
            </button>
        </nav>
        <div class="header-controls">
            <span data-key="welcome_message">Bienvenido, usuario</span>
        </div>
    </header>

    <div class="main-container">
        <main class="dashboard-grid">
            <div class="widget-card" id="calculator-widget">
                <h2 class="widget-title" data-key="calculator_title">Calculadora de Cambio</h2>
                <form id="calcForm">
                    <label for="cuenta" data-key="customer_account_label">Cuenta del cliente (€):</label>
                    <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

                    <label for="recibido" data-key="money_received_label">Dinero Recibido (€):</label>
                    <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

                    <button type="submit" id="calcularBtn" data-key="calculate_change_button">Calcular Cambio</button>
                </form>
                <div id="mensaje" role="alert"></div>
                <button type="button" id="dispenseBtn" style="display: none; margin-top: 10px;" data-key="dispense_change_button">Dispensar Cambio</button>
            </div>
            <div class="widget-card" id="voice-widget">
                <h2 class="widget-title" data-key="voice_control_title">Control por Voz</h2>
                <div id="voiceControls">
                    <button id="startRecording" data-key="record_voice_button">Grabar voz</button>
                    <button id="stopRecording" disabled data-key="stop_button">Detener</button>
                </div>
                <div id="voiceResult" role="status" aria-live="polite"></div>
            </div>

            <div class="widget-card" id="interactions-link-widget">
                <h2 class="widget-title" data-key="interactions_history_title">Historial de Interacciones</h2>
                <p data-key="interactions_history_desc">Consulta el historial completo de todas las transacciones registradas en el sistema.</p>
                <a href="/interactions" class="button-link" style="text-align: center; display: block; margin-top: 20px;" data-key="view_full_history_button">Ver Historial Completo</a>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
