<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Intranet</title>
    <link rel="stylesheet" href="static/intranet.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="widget-card">
            <div class="login-header">
                <img src="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image" alt="Logo ONCE">
                <h1>Acceso a Intranet</h1>
            </div>
            <form id="loginForm">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Acceder</button>
            </form>
            <div id="error-message" role="alert"></div>
        </div>
    </div>

    <script src="static/authService.js"></script>
    <script src="static/login.js"></script>
</body>
</html>
