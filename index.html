<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora ONCE</title>
    <link rel="icon" href="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image_view_fullscreen" type="image/png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        header img {
            max-width: 150px;
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-weight: 600;
        }
        .card {
            background: #fdfdfd;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
        }
        button:hover:not(:disabled) {
            background-color: #555;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #mensaje, #voiceResult {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            border-radius: 4px;
        }
        #mensaje.alert-info {
            background-color: #e6f7ff;
            color: #005f8d;
        }
        #mensaje.alert-danger {
            background-color: #fff0f0;
            color: #d93030;
        }
        #voiceControls {
            display: flex;
            gap: 10px;
        }
        #voiceControls button {
            margin-right: 0;
            background-color: #666;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: #555;
            transition: transform 0.3s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
        }

        .sun-icon, .moon-icon {
            display: none;
        }

        body:not(.dark-mode) .moon-icon {
            display: inline-block;
        }

        body.dark-mode .sun-icon {
            display: inline-block;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
    <link rel="stylesheet" href="static/dark-mode.css">
</head>
<body>
    <header>
        <img src="https://www.once.es/comunicacion/galeria-multimedia/logos-once/once-responsive-rgb-png/image_view_fullscreen" alt="Logo de la ONCE">
    </header>
    <button id="theme-toggle" aria-label="Toggle dark mode">
        <span class="sun-icon" aria-hidden="true">☀️</span>
        <span class="moon-icon" aria-hidden="true">🌙</span>
    </button>
    <h1>Calculadora de Cambio</h1>

    <div class="card">
        <form id="calcForm" aria-labelledby="calc-heading">
            <h2 id="calc-heading" class="sr-only">Calculadora de Cambio</h2>
            <label for="cuenta">Cuenta del cliente (€):</label>
            <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required aria-label="Cuenta del cliente en euros" />

            <label for="recibido">Dinero Recibido (€):</label>
            <input type="number" id="recibido" name="recibido" step="0.01" min="0" required aria-label="Dinero recibido en euros" />

            <button type="submit" id="calcularBtn">Calcular Cambio</button>
        </form>

        <div id="mensaje" class="alert d-none" role="alert"></div>
    </div>

    <div class="card">
        <h2 id="voice-heading">Reconocimiento de Voz</h2>
        <div id="voiceControls" role="group" aria-labelledby="voice-heading">
            <button id="startRecording">Grabar voz</button>
            <button id="stopRecording" disabled>Detener grabación</button>
        </div>
        <div id="voiceResult" role="status" aria-live="polite"></div>
    </div>

    <div class="card">
        <h2>Interacciones</h2>
        <button id="viewInteractionsBtn">Ver Interacciones</button>
        <div id="interactionsContainer" class="mt-3"></div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
