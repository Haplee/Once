<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora de Cambio</title>
  <!-- Icono personalizado con respaldo -->
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icono.ico') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">Calculadora de Cambio</a>
    </div>
  </nav>
  <main class="container">
    <section class="card mx-auto mt-5 p-4">
      <h3 class="text-center mb-4">Calculadora de Cambio</h3>
      <form id="calcForm" method="POST" action="/calcular">
        <div class="mb-3">
          <label for="cuenta" class="form-label">Cuenta del Cliente (€)</label>
          <input type="number" step="any" class="form-control" id="cuenta" name="cuenta" 
              placeholder="Ej. 50.00" aria-label="Monto de la cuenta" required>
        </div>
        <div class="mb-3">
          <label for="recibido" class="form-label">Dinero Recibido (€)</label>
          <input type="number" step="any" class="form-control" id="recibido" name="recibido" 
              placeholder="Ej. 100.00" aria-label="Dinero recibido" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="calcularBtn">Calcular Cambio</button>
      </form>
      <div id="mensaje" class="alert mt-4 d-none" role="alert"></div>
      <button id="toggleSpeech" class="btn btn-secondary w-100 mt-3">Activar Voz</button>
    </section>
  </main>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let speechEnabled = true;

    // Función para remover emoticonos usando expresión regular
    function removeEmojis(text) {
      return text.replace(/[\u2700-\u27BF\uE000-\uF8FF\uD83C-\uDBFF\uDC00-\uDFFF]+/g, '');
    }

    // Función para reproducir texto en voz alta sin emoticonos
    function speakText(text) {
      if (speechEnabled && 'speechSynthesis' in window) {
        let cleanText = removeEmojis(text);
        let utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'es-ES';
        window.speechSynthesis.speak(utterance);
      } else if (!speechEnabled) {
        console.log("Síntesis de voz desactivada.");
      } else if ('speechSynthesis' in window === false) { // Solo advertir si la API no existe
        console.warn("Tu navegador no soporta la síntesis de voz.");
      }
    }

    // Manejar el envío del formulario vía AJAX
    const calcForm = document.getElementById("calcForm");
    const calcButton = document.getElementById("calcularBtn");
    const originalButtonText = calcButton.innerHTML; // Guardar el texto original del botón
    const cuentaInput = document.getElementById("cuenta");
    const recibidoInput = document.getElementById("recibido");
    const mensajeDiv = document.getElementById("mensaje");


    calcForm.addEventListener("submit", async function(event) {
      event.preventDefault();

      // Validación básica en el cliente antes de enviar
      // Los campos son 'required' en HTML5, pero una doble verificación no hace daño.
      if (!cuentaInput.value.trim() || !recibidoInput.value.trim()) {
        mensajeDiv.classList.remove("d-none", "alert-info");
        mensajeDiv.classList.add("alert-danger");
        mensajeDiv.innerText = "Por favor, ingresa ambos valores.";
        // Ocultar mensaje después de un tiempo o si se reintenta
        return;
      }

      // Deshabilitar botón y mostrar spinner
      calcButton.disabled = true;
      calcButton.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Calculando...`;
      mensajeDiv.classList.add("d-none"); // Ocultar mensaje anterior

      const formData = new FormData(event.target);
      try {
        const response = await fetch("/calcular", {
          method: "POST",
          body: formData
        });
        const data = await response.json();

        if (response.ok) {
          mensajeDiv.classList.remove("d-none", "alert-danger");
          mensajeDiv.classList.add("alert-info");
          mensajeDiv.innerHTML = `El cambio es: <strong>${data.cambio.toFixed(2)} euros</strong>.`;
          speakText(data.mensaje);
        } else {
          mensajeDiv.classList.remove("d-none", "alert-info");
          mensajeDiv.classList.add("alert-danger");
          mensajeDiv.innerText = data.error; // data.error viene del backend (JSON)
        }
      } catch (error) {
        console.error("Error en la petición fetch:", error);
        mensajeDiv.classList.remove("d-none", "alert-info");
        mensajeDiv.classList.add("alert-danger");
        mensajeDiv.innerText = "Error al conectar con el servidor. Inténtalo de nuevo.";
      } finally {
        // Rehabilitar botón y restaurar texto
        calcButton.disabled = false;
        calcButton.innerHTML = originalButtonText;
      }
    });

    // Manejar el botón de activar/desactivar voz
    const toggleSpeechButton = document.getElementById("toggleSpeech");
    toggleSpeechButton.addEventListener("click", function() {
      speechEnabled = !speechEnabled;
      toggleSpeechButton.innerText = speechEnabled ? "Desactivar Voz" : "Activar Voz";
      if (speechEnabled) {
        // Opcional: Dar feedback auditivo al activar.
        // speakText("Síntesis de voz activada.");
      } else {
        // Si se desactiva la voz, cancelar cualquier habla pendiente.
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
      }
    });
  </script>
</body>
</html>
