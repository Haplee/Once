<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reconocimiento de Voz y Calculadora de Cambio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #009A44;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #009A44;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        #mensaje, #voiceResult {
            margin-top: 15px;
            font-weight: bold;
        }
        #voiceControls button {
            margin-right: 10px;
            background-color: #007BFF;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: #009A44;
            transition: transform 0.3s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
        }

        .sun-icon, .moon-icon {
            display: none;
        }

        body:not(.dark-mode) .sun-icon {
            display: inline-block;
        }

        body.dark-mode .moon-icon {
            display: inline-block;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='dark-mode.css') }}">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">
        <span class="sun-icon" aria-hidden="true">☀️</span>
        <span class="moon-icon" aria-hidden="true">🌙</span>
    </button>
    <h1>Calculadora de Cambio</h1>

    <div class="card">
        <form id="calcForm" aria-labelledby="calc-heading">
            <h2 id="calc-heading" class="sr-only">Calculadora de Cambio</h2>
            <label for="cuenta">Cuenta del cliente (€):</label>
            <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required aria-label="Cuenta del cliente en euros" />

            <label for="recibido">Dinero Recibido (€):</label>
            <input type="number" id="recibido" name="recibido" step="0.01" min="0" required aria-label="Dinero recibido en euros" />

            <button type="submit" id="calcularBtn">Calcular Cambio</button>
        </form>

        <div id="mensaje" class="alert d-none" role="alert"></div>
    </div>

    <div class="card">
        <h2 id="voice-heading">Reconocimiento de Voz</h2>
        <div id="voiceControls" role="group" aria-labelledby="voice-heading">
            <button id="startRecording">Grabar voz</button>
            <button id="stopRecording" disabled>Detener grabación</button>
        </div>
        <div id="voiceResult" role="status" aria-live="polite"></div>
    </div>

    <div class="card">
        <h2>Interacciones</h2>
        <button id="viewInteractionsBtn">Ver Interacciones</button>
        <div id="interactionsContainer" class="mt-3"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
