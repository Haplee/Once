<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reconocimiento de Voz y Calculadora de Cambio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #009A44;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #009A44;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        #mensaje, #voiceResult {
            margin-top: 15px;
            font-weight: bold;
        }
        #voiceControls button {
            margin-right: 10px;
            background-color: #007BFF;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Cambio & Reconocimiento de Voz</h1>

    <div class="card">
        <form id="calcForm">
            <label for="cuenta">Cuenta (€):</label>
            <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

            <label for="recibido">Recibido (€):</label>
            <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

            <button type="submit" id="calcularBtn">Calcular Cambio</button>
        </form>

        <div id="mensaje" class="alert d-none"></div>
    </div>

    <div class="card">
        <h2>Reconocimiento de Voz</h2>
        <div id="voiceResult"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
