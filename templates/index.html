<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reconocimiento de Voz y Calculadora de Cambio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #009A44;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #009A44;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        #mensaje, #voiceResult {
            margin-top: 15px;
            font-weight: bold;
        }
        #voiceControls button {
            margin-right: 10px;
            background-color: #007BFF;
        }
    </style>
</head>
<body>
    <h1>Calculadora de Cambio & Reconocimiento de Voz</h1>

    <div class="card">
        <form id="calcForm">
            <label for="cuenta">Cuenta (€):</label>
            <input type="number" id="cuenta" name="cuenta" step="0.01" min="0" required />

            <label for="recibido">Recibido (€):</label>
            <input type="number" id="recibido" name="recibido" step="0.01" min="0" required />

            <button type="submit" id="calcularBtn">Calcular Cambio</button>
        </form>

        <div id="mensaje" class="alert d-none"></div>
    </div>

    <div class="card">
        <h2>Reconocimiento de Voz</h2>
        <div id="voiceControls">
            <button id="startRecording">Grabar voz</button>
            <button id="stopRecording" disabled>Detener grabación</button>
        </div>
        <div id="voiceResult"></div>
    </div>

    <script>
        // Código JS para grabación y envío al backend para reconocimiento
        let mediaRecorder;
        let audioChunks = [];

        const startBtn = document.getElementById("startRecording");
        const stopBtn = document.getElementById("stopRecording");
        const resultDiv = document.getElementById("voiceResult");

        stopBtn.disabled = true;

        startBtn.addEventListener("click", async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.start();
            audioChunks = [];

            mediaRecorder.addEventListener("dataavailable", event => {
              audioChunks.push(event.data);
            });

            mediaRecorder.addEventListener("stop", async () => {
              const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
              const formData = new FormData();
              formData.append("audio_data", audioBlob, "grabacion.wav");

              resultDiv.innerText = "Procesando reconocimiento...";

              try {
                const response = await fetch("/reconocer-voz", {
                  method: "POST",
                  body: formData
                });
                const data = await response.json();

                if (response.ok) {
                  if(data.texto && data.texto.trim() !== "") {
                    resultDiv.innerText = `Texto reconocido: ${data.texto}`;
                  } else {
                    resultDiv.innerText = data.mensaje || "No se reconoció texto.";
                  }
                } else {
                  resultDiv.innerText = `Error: ${data.error || "Error desconocido"}`;
                }
              } catch (error) {
                resultDiv.innerText = "Error en la conexión con el servidor.";
              }
            });

            startBtn.disabled = true;
            stopBtn.disabled = false;

          } catch (err) {
            alert("No se pudo acceder al micrófono: " + err);
          }
        });

        stopBtn.addEventListener("click", () => {
          mediaRecorder.stop();
          startBtn.disabled = false;
          stopBtn.disabled = true;
        });

        // Código JS para formulario calcular cambio (tu código original simplificado)
        const calcForm = document.getElementById("calcForm");
        const calcButton = document.getElementById("calcularBtn");
        const mensajeDiv = document.getElementById("mensaje");

        calcForm.addEventListener("submit", async function(event) {
          event.preventDefault();

          const cuentaInput = document.getElementById("cuenta");
          const recibidoInput = document.getElementById("recibido");

          if (!cuentaInput.value.trim() || !recibidoInput.value.trim()) {
            mensajeDiv.classList.remove("d-none", "alert-info");
            mensajeDiv.classList.add("alert-danger");
            mensajeDiv.innerText = "Por favor, ingresa ambos valores.";
            return;
          }

          calcButton.disabled = true;
          calcButton.innerText = "Calculando...";
          mensajeDiv.classList.add("d-none");

          const formData = new FormData(calcForm);

          try {
            const response = await fetch("/calcular", {
              method: "POST",
              body: formData
            });
            const data = await response.json();

            if (response.ok) {
              mensajeDiv.classList.remove("d-none", "alert-danger");
              mensajeDiv.classList.add("alert-info");
              mensajeDiv.innerHTML = `El cambio es: <strong>${data.cambio.toFixed(2)} euros</strong>.`;
            } else {
              mensajeDiv.classList.remove("d-none", "alert-info");
              mensajeDiv.classList.add("alert-danger");
              mensajeDiv.innerText = data.error;
            }
          } catch (error) {
            mensajeDiv.classList.remove("d-none", "alert-info");
            mensajeDiv.classList.add("alert-danger");
            mensajeDiv.innerText = "Error al conectar con el servidor. Inténtalo de nuevo.";
          } finally {
            calcButton.disabled = false;
            calcButton.innerText = "Calcular Cambio";
          }
        });
    </script>
</body>
</html>
